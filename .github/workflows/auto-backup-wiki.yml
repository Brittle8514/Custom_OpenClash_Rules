name: Auto backup Wiki

on:
  workflow_dispatch:
  schedule:
    - cron: '0 16 * * *'

permissions:
  contents: write

jobs:
  backup-wiki:
    if: github.repository == 'Brittle8514/Custom_OpenClash_Rules'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0

      - name: Clone wiki repository
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone https://x-access-token:${TOKEN}@github.com/${{ github.repository }}.wiki.git _wiki

      - name: Sync wiki files
        run: |
          rm -rf wiki
          mkdir -p wiki

          cp -r _wiki/* wiki/

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add wiki

          if ! git diff --cached --quiet; then
            commit_time=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')

            git commit -m "chore(wiki): auto backup Wiki at ${commit_time} UTC+8"

            git push origin main
          else
            echo "No wiki changes"
          fi