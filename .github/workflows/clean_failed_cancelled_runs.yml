name: Clean Failed/Cancelled Workflow Runs

on:
  workflow_dispatch:

jobs:
  clean-failed-cancelled:
    if: github.repository == 'Brittle8514/Custom_OpenClash_Rules'
    runs-on: ubuntu-latest

    env:
      GH_TOKEN: ${{ secrets.GH_PAT }}
      REPO: ${{ github.repository }}

    steps:
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Delete failed and cancelled runs
        run: |
          echo "Cleaning failed/cancelled runs..."

          while true; do
            response=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
              "https://api.github.com/repos/$REPO/actions/runs?per_page=100")

            runs=$(echo "$response" | jq -r '
              .workflow_runs[]
              | select(.conclusion=="failure" or .conclusion=="cancelled")
              | .id
            ')

            if [ -z "$runs" ]; then
              echo "No more failed/cancelled runs."
              break
            fi

            for run_id in $runs; do
              echo "Deleting run $run_id"
              curl -s -X DELETE -H "Authorization: Bearer $GH_TOKEN" \
                "https://api.github.com/repos/$REPO/actions/runs/$run_id"
            done
          done

      - name: Delete THIS workflow runs (all statuses)
        run: |
          echo "Cleaning THIS workflow runs..."

          workflow_id=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/$REPO/actions/workflows" \
            | jq -r ".workflows[] | select(.name==\"Clean Failed/Cancelled Workflow Runs\") | .id")

          if [ -z "$workflow_id" ]; then
            echo "Workflow ID not found."
            exit 0
          fi

          while true; do
            response=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
              "https://api.github.com/repos/$REPO/actions/workflows/$workflow_id/runs?per_page=100")

            runs=$(echo "$response" | jq -r '.workflow_runs[].id')

            if [ -z "$runs" ]; then
              echo "No more runs for this workflow."
              break
            fi

            for run_id in $runs; do
              echo "Deleting self run $run_id"
              curl -s -X DELETE -H "Authorization: Bearer $GH_TOKEN" \
                "https://api.github.com/repos/$REPO/actions/runs/$run_id"
            done
          done

          echo "Done."
